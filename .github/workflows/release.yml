name: Release

on:
  push:
    tags:
      - "types-v*.*.*"
      - "server-v*.*.*"
      - "client-v*.*.*"
  workflow_dispatch:
    inputs:
      package:
        description: "Workspace package to publish (types, server, or client)"
        required: true
        type: choice
        options:
          - types
          - server
          - client

# id-token: write lets npm use the GitHub OIDC token for keyless publishing.
# No NPM_TOKEN secret is needed — npm Trusted Publishers verifies this workflow
# directly via OIDC, which prevents supply-chain attacks from leaked tokens.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # No registry-url: setup-node@v4 injects GITHUB_TOKEN as NODE_AUTH_TOKEN when
      # registry-url is set, which blocks npm's OIDC Trusted Publishers path even after
      # unsetting the variable. The Publish step writes its own minimal .npmrc instead.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Determine package
        id: pkg
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.package }}" ]; then
            echo "name=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF##refs/tags/}"
            case "$tag" in
              types-v*) echo "name=types" >> "$GITHUB_OUTPUT" ;;
              server-v*) echo "name=server" >> "$GITHUB_OUTPUT" ;;
              client-v*) echo "name=client" >> "$GITHUB_OUTPUT" ;;
              *) echo "Unrecognised tag $tag"; exit 1 ;;
            esac
          fi

      - name: Install
        run: bun install --frozen-lockfile

      # Build first so packages/types/dist/ exists before server tests
      # import "@opencall/types" (which resolves through the published
      # declaration files via the workspace symlink).
      - name: Build all workspaces (types before server — server depends on types)
        run: bun run build

      - name: Test
        run: bun test

      - name: Publish
        working-directory: packages/${{ steps.pkg.outputs.name }}
        run: |
          # Write a minimal user-level .npmrc — registry only, no auth token.
          # Project-level .npmrc is silently ignored in workspace packages; writing
          # to HOME ensures npm reads it. With no _authToken configured, npm falls
          # through to OIDC Trusted Publishers via ACTIONS_ID_TOKEN_REQUEST_URL.
          echo "registry=https://registry.npmjs.org/" > "${HOME}/.npmrc"
          npm publish --provenance --access public
